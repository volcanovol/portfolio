<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tahar | Admin Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --dim: #94a3b8; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; border: 1px solid #334155; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #0f172a; transition: 0.3s; }
        
        #admin-ui { display: none; }
        
        /* Message Styling */
        .msg-item { background: #0f172a; padding: 15px; margin-top: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .msg-item:hover { border-color: var(--accent); }
        .msg-preview { display: flex; justify-content: space-between; font-weight: bold; }
        .msg-full-content { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #334155; color: var(--dim); }

        /* Work List */
        .work-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .del-btn { background: #ef4444; color: white; padding: 5px 10px; font-size: 12px; width: auto; }
        
        h2, h3 { color: var(--accent); }
        hr { border: 0; border-top: 1px solid #334155; margin: 30px 0; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Open Dashboard</button>
    </div>

    <div id="admin-ui" class="box">
        <h2>Welcome, Tahar 🇩🇿</h2>
        
        <h3>➕ Add New Work</h3>
        <input type="text" id="wTitle" placeholder="Work Title">
        <textarea id="wDesc" placeholder="Describe this project..."></textarea>
        
        <label style="font-size: 13px; color: var(--dim);">Upload Project Image:</label>
        <input type="file" id="wImgFile" accept="image/*">
        
        <button onclick="addWork()">Upload & Publish</button>

        <div id="work-list"></div>

        <hr>

        <h3>📥 Inbox (Click message to read)</h3>
        <div id="msg-list"></div>
        <button onclick="clearInbox()" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 20px;">Clear All Messages</button>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="index.html" style="color: var(--dim); text-decoration: none; font-size: 14px;">← Back to Site</a>
        </div>
    </div>

    <script>
        let works = JSON.parse(localStorage.getItem('taharWorks')) || [];
        let messages = JSON.parse(localStorage.getItem('taharInbox')) || [];

        function login() {
            if(document.getElementById('user').value === "tahar" && document.getElementById('pass').value === "dz2026") {
                document.getElementById('login-box').style.display='none';
                document.getElementById('admin-ui').style.display='block';
                renderAll();
            } else { alert("Wrong password!"); }
        }

        function addWork() {
            const title = document.getElementById('wTitle').value;
            const desc = document.getElementById('wDesc').value;
            const fileInput = document.getElementById('wImgFile');
            const file = fileInput.files[0];

            if(!title || !file) return alert("Title and Image are required!");

            const reader = new FileReader();
            reader.onload = function(e) {
                works.push({ title, desc, image: e.target.result });
                localStorage.setItem('taharWorks', JSON.stringify(works));
                alert("Work Uploaded!");
                location.reload(); 
            };
            reader.readAsDataURL(file);
        }

        function toggleMessage(index) {
            const content = document.getElementById(`msg-content-${index}`);
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        }

        function renderAll() {
            // Render Works
            const workList = document.getElementById('work-list');
            workList.innerHTML = "<h4>Your Current Projects:</h4>";
            works.forEach((w, i) => {
                workList.innerHTML += `
                    <div class="work-item">
                        <span>${w.title}</span>
                        <button class="del-btn" onclick="deleteWork(${i})">Delete</button>
                    </div>`;
            });

            // Render Messages
            const msgList = document.getElementById('msg-list');
            msgList.innerHTML = messages.length === 0 ? "<p>No messages yet.</p>" : "";
            messages.forEach((m, i) => {
                msgList.innerHTML += `
                    <div class="msg-item" onclick="toggleMessage(${i})">
                        <div class="msg-preview">
                            <span>From: ${m.name}</span>
                            <small>${m.time}</small>
                        </div>
                        <div class="msg-full-content" id="msg-content-${i}">
                            ${m.text}
                        </div>
                    </div>`;
            });
        }

        function deleteWork(i) {
            works.splice(i, 1);
            localStorage.setItem('taharWorks', JSON.stringify(works));
            renderAll();
        }

        function clearInbox() {
            if(confirm("Delete everything?")) {
                localStorage.removeItem('taharInbox');
                messages = [];
                renderAll();
            }
        }
    </script>
</body>
</html>
