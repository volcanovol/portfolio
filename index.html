<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahar | Dev Portfolio</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --dim: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        nav { position: fixed; top: 0; width: 100%; padding: 20px 10%; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; border-bottom: 1px solid #334155; z-index: 1000; }
        .logo { font-weight: 800; color: var(--accent); text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { text-decoration: none; color: var(--text); font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--accent); }
        .hero { padding: 150px 10% 60px; max-width: 1200px; margin: 0 auto; }
        .hero h1 { font-size: 3rem; }
        .hero span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 0 10% 100px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { color: var(--accent); margin-bottom: 8px; }
        .card-body p { color: var(--dim); font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">TAHAR.DEV</a>
        <ul>
            <li><a href="index.html">Works</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="hero">
        <h1>Hi, I'm <span>Tahar</span>.</h1>
        <p style="color:var(--dim)">Young Dev from Algeria 🇩🇿 building the future of the web.</p>
    </div>
    <div class="grid" id="main-grid"></div>
    <script>
        const works = JSON.parse(localStorage.getItem('taharWorks')) || [];
        const grid = document.getElementById('main-grid');
        if(works.length === 0) grid.innerHTML = "<p>No works yet.</p>";
        works.forEach(w => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${w.image}" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Not+Found'">
                    <div class="card-body">
                        <h3>${w.title}</h3>
                        <p>${w.desc}</p>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
