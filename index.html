<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahar | Developer Portfolio</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --dim: #94a3b8;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation bar */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 10%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.3rem; color: var(--accent); text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav a { text-decoration: none; color: var(--text); font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        /* Hero Section (Your Info) */
        .hero {
            padding: 150px 10% 80px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: left;
        }

        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero h1 span { color: var(--accent); }
        .hero p { font-size: 1.2rem; color: var(--dim); max-width: 600px; margin-bottom: 25px; }
        
        .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Works Section */
        .works-section { padding: 40px 10%; max-width: 1200px; margin: 0 auto; }
        .works-section h2 { margin-bottom: 40px; font-size: 2rem; border-left: 4px solid var(--accent); padding-left: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .work-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.3s ease;
        }

        .work-card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .work-card img { width: 100%; height: 220px; object-fit: cover; }
        .work-card-content { padding: 25px; }
        .work-card-content h3 { color: var(--accent); margin-bottom: 10px; }
        .work-card-content p { color: var(--dim); font-size: 0.95rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            nav ul { display: none; } /* Simplified for mobile */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">TAHAR.DEV</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <span class="badge">Young Developer from Algeria 🇩🇿</span>
        <h1>Hi, I'm <span>Tahar</span>.</h1>
        <p>I build modern web applications and digital experiences. I specialize in front-end development and creating clean, interactive interfaces.</p>
        <div class="social-links">
            <a href="contact.html" style="background: var(--accent); color: #0f172a; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold;">Work With Me</a>
        </div>
    </header>

    <main class="works-section">
        <h2>My Projects</h2>
        <div class="grid" id="project-grid">
            </div>
    </main>

    <script>
        function loadWorks() {
            const grid = document.getElementById('project-grid');
            const works = JSON.parse(localStorage.getItem('taharWorks')) || [];

            if (works.length === 0) {
                grid.innerHTML = "<p style='color: var(--dim)'>No projects published yet. Visit the Admin page to add your work!</p>";
                return;
            }

            works.forEach(work => {
                grid.innerHTML += `
                    <div class="work-card">
                        <img src="${work.image}" alt="${work.title}">
                        <div class="work-card-content">
                            <h3>${work.title}</h3>
                            <p>${work.desc}</p>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = loadWorks;
    </script>
</body>
</html>
