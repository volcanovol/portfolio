<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Tahar Dev</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --text: #f8fafc;
            --dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .box {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: fit-content;
        }

        h2 { color: var(--accent); margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        h3 { margin-top: 30px; font-size: 1.1rem; color: var(--dim); }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Sections */
        #admin-ui { display: none; }

        /* Work Items List */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #0f172a;
            margin-top: 8px;
            border-radius: 6px;
        }

        .del-btn {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
        }

        /* Inbox Styles */
        .msg-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 4px solid var(--accent);
        }

        .msg-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--accent); }
        .msg-body { margin-top: 8px; font-size: 0.9rem; line-height: 1.4; }

        .nav-links { margin-top: 20px; text-align: center; }
        .nav-links a { color: var(--dim); text-decoration: none; font-size: 0.8rem; margin: 0 10px; }
        .nav-links a:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="admin-ui" class="box">
        <h2>Dashboard</h2>
        
        <h3>➕ Add New Work</h3>
        <input type="text" id="workTitle" placeholder="Project Name">
        <textarea id="workDesc" placeholder="Project Description"></textarea>
        <label style="font-size: 11px; color: var(--dim);">Project Image:</label>
        <input type="file" id="workImg" accept="image/*">
        <button onclick="saveWork()">Publish Project</button>

        <div id="work-list"></div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #334155;">

        <h3>📥 Social Inbox (Messages)</h3>
        <div id="message-inbox"></div>
        <button onclick="clearAllMessages()" style="background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px;">Clear Inbox</button>

        <div class="nav-links">
            <a href="index.html">← View Website</a>
            <a href="#" onclick="location.reload()">Logout</a>
        </div>
    </div>

    <script>
        // 1. LOGIN LOGIC
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Simple credentials for you
            if(u === "tahar" && p === "dz2026") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'block';
                loadAllData();
            } else {
                alert("Incorrect username or password!");
            }
        }

        // 2. DATA LOADING
        function loadAllData() {
            renderWorks();
            renderMessages();
        }

        // 3. WORK MANAGEMENT (PORTFOLIO)
        let works = JSON.parse(localStorage.getItem('taharWorks')) || [];

        function saveWork() {
            const title = document.getElementById('workTitle').value;
            const desc = document.getElementById('workDesc').value;
            const file = document.getElementById('workImg').files[0];

            if(!title || !desc || !file) return alert("Please fill all fields!");

            const reader = new FileReader();
            reader.onload = function(e) {
                works.push({ title, desc, image: e.target.result });
                localStorage.setItem('taharWorks', JSON.stringify(works));
                alert("Work Added!");
                document.getElementById('workTitle').value = "";
                document.getElementById('workDesc').value = "";
                renderWorks();
            };
            reader.readAsDataURL(file);
        }

        function renderWorks() {
            const list = document.getElementById('work-list');
            list.innerHTML = "<h3>Current Projects:</h3>";
            works.forEach((w, i) => {
                list.innerHTML += `
                    <div class="item">
                        <span>${w.title}</span>
                        <button class="del-btn" onclick="deleteWork(${i})">Remove</button>
                    </div>
                `;
            });
        }

        function deleteWork(index) {
            works.splice(index, 1);
            localStorage.setItem('taharWorks', JSON.stringify(works));
            renderWorks();
        }

        // 4. MESSAGE INBOX MANAGEMENT
        function renderMessages() {
            const inbox = document.getElementById('message-inbox');
            const messages = JSON.parse(localStorage.getItem('taharInbox')) || [];

            if(messages.length === 0) {
                inbox.innerHTML = "<p style='color:var(--dim); font-size:0.9rem;'>No messages yet.</p>";
                return;
            }

            inbox.innerHTML = "";
            messages.forEach((m) => {
                inbox.innerHTML += `
                    <div class="msg-card">
                        <div class="msg-header">
                            <strong>${m.name}</strong>
                            <span>${m.time}</span>
                        </div>
                        <div class="msg-body">${m.text}</div>
                    </div>
                `;
            });
        }

        function clearAllMessages() {
            if(confirm("Are you sure you want to delete all messages?")) {
                localStorage.removeItem('taharInbox');
                renderMessages();
            }
        }
    </script>
</body>
</html>
